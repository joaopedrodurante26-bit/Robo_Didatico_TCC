<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robô Vespa</title>
    <style>
        body { font-family: Arial; text-align: center; }
        button {
            padding: 20px;
            font-size: 20px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Controle do Robô</h1>

    <h2>Controle</h2>

    <div id="joystick" style="
        width: 200px;
        height: 200px;
        background: #ccc;
        border-radius: 50%;
        position: relative;
        margin: auto;
    ">
        <div id="stick" style="
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 70px;
            left: 70px;
        "></div>
    </div>

    <h2>Status do Robô</h2>

    <p>Distância: <span id="distancia">--</span> cm</p>
    <p>Bateria: <span id="bateria">--</span> V</p>
    <p>Estado: <span id="estado">--</span></p>

    <script src="script.js"></script>
</body>
</html>
